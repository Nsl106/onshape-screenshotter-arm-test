# Onshape Screenshotter configuration — see README for a walkthrough.
#
# Your Onshape API keys are NOT here — they live in GitHub Actions secrets.

[settings]
image_width  = 1024           # px; Onshape's default is 128, far too small for a timelapse
image_height = 1024           # px
view = "isometric"            # a named view, or 12 space-separated numbers for a view matrix
timelapse_fps = 10            # frames per second in the rendered timelapse video

# When to take screenshots. List the local-time hours (0-23) you want a frame at;
# the job takes one screenshot at each, and does nothing at every other hour. This
# is your API budget dial: one Onshape call per hour listed (so the 4 below ≈ 1,460
# calls/year — see the README "API budget"). An empty list [] pauses capture
# entirely (no screenshots, no API calls).
timezone = "UTC"                    # IANA timezone the hours below are in (e.g. "America/New_York")
capture_hours = [8, 12, 16, 20]     # local hours to screenshot at

# keepalive: GitHub automatically DISABLES a scheduled workflow after 60 days with
# no repo activity. During build season this never triggers (frames are committed
# as your CAD changes), but in the quiet offseason it can. When true, the capture
# workflow commits a tiny no-op file roughly monthly so the scheduled job keeps
# running untouched. Set false if you'd rather re-enable Actions by hand each January.
keepalive = true

# One [[targets]] block per part studio or assembly you want to track.
# Just paste the Onshape URL from your browser's address bar — the document,
# workspace, and element IDs are read from it, and the element's type and name are
# fetched from Onshape automatically. Frames are stored under the element id, and the
# README's "Tracked CAD" section is updated with each target's fetched name and a link.
[[targets]]
url = "https://cad.onshape.com/documents/REPLACE_DID/w/REPLACE_WID/e/REPLACE_EID"

# Add more targets by copying the block above:
# [[targets]]
# url = "https://cad.onshape.com/documents/.../w/.../e/..."
